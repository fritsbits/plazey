[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

[[redirects]]
  from = "/"
  to = "/fr"
  status = 302
  conditions = {Language = ["fr", "fr-BE", "fr-FR", "fr-CH"]}

[[redirects]]
  from = "/"
  to = "/nl"
  status = 302

[[redirects]]
  from = "/nl/doe-mee"
  to = "/nl/vrijwilliger"
  status = 301

[[redirects]]
  from = "/nl/doe-mee/*"
  to = "/nl/vrijwilliger"
  status = 301

[[redirects]]
  from = "/fr/participez"
  to = "/fr/benevole"
  status = 301

[[redirects]]
  from = "/fr/participez/*"
  to = "/fr/benevole"
  status = 301

# Programme detail pages were folded into the overview (expandable cards).
# Old act links land on the overview; the overview index itself is a real
# file, so Netlify serves it and only deeper paths match these splats.
[[redirects]]
  from = "/nl/programma/*"
  to = "/nl/programma/"
  status = 301

[[redirects]]
  from = "/fr/programme/*"
  to = "/fr/programme/"
  status = 301
