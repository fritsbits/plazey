[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "24"

[[redirects]]
  from = "/"
  to = "/fr"
  status = 302
  conditions = {Language = ["fr", "fr-BE", "fr-FR", "fr-CH"]}

[[redirects]]
  from = "/"
  to = "/nl"
  status = 302

[[redirects]]
  from = "/nl/doe-mee"
  to = "/nl/vrijwilliger"
  status = 301

[[redirects]]
  from = "/nl/doe-mee/*"
  to = "/nl/vrijwilliger"
  status = 301

[[redirects]]
  from = "/fr/participez"
  to = "/fr/benevole"
  status = 301

[[redirects]]
  from = "/fr/participez/*"
  to = "/fr/benevole"
  status = 301

# FR programme slugs were unified with NL filenames for single-entry CMS editing.
[[redirects]]
  from = "/fr/programme/battle-de-danse"
  to = "/fr/programme/dance-battle"
  status = 301

[[redirects]]
  from = "/fr/programme/court-metrages"
  to = "/fr/programme/kortfilms"
  status = 301

[[redirects]]
  from = "/fr/programme/theatre-froefroe"
  to = "/fr/programme/theater-froefroe"
  status = 301

[[redirects]]
  from = "/fr/programme/arborescences-samedi"
  to = "/fr/programme/arborescences-zaterdag"
  status = 301

[[redirects]]
  from = "/fr/programme/arborescences-dimanche"
  to = "/fr/programme/arborescences-zondag"
  status = 301
